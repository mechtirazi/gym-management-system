<div class="login-container">
  <div class="glass-card login-card">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="gym-logo">
        <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5 a4 4 0 11-8 0 4 4 0 018 0zM3 20 a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>

      <h2>Create Account</h2>
      <p>Start your transformation today</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- NAME -->
      <div class="form-group">
        <label for="register-name">Full Name</label>
        <div class="input-wrapper">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>

          <input id="register-name" type="text" formControlName="name" placeholder="John Doe" autocomplete="name"
            required>
        </div>
      </div>

      <!-- LAST NAME -->
      <div class="form-group">
        <label for="register-lastname">Last Name</label>
        <div class="input-wrapper">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>

          <input id="register-lastname" type="text" formControlName="last_name" placeholder="Doe" autocomplete="family-name"
            required>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="register-email">Email Address</label>
        <div class="input-wrapper">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9" />
          </svg>

          <input id="register-email" type="email" formControlName="email" placeholder="name@example.com"
            autocomplete="email" required>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <div class="password-header">
          <label for="register-password">Password</label>
          <button type="button" class="show-btn" (click)="togglePassword()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>

        <div class="input-wrapper">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>

          <input id="register-password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
            placeholder="Create a strong password" autocomplete="new-password" required>
        </div>
      </div>

      <!-- ROLE -->
      <div class="form-group">
        <label for="register-role">Role</label>
        <div class="input-wrapper">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>

          <select id="register-role" formControlName="role" required>
            <option value="member">Member</option>
            <option value="staff">Staff</option>
            <option value="owner">Owner</option>
          </select>
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || isLoading()">
        <ng-container *ngIf="isLoading()">
          <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10" stroke-width="4" style="opacity: 0.25;"></circle>
            <path style="opacity: 0.75;" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          Creating Account...
        </ng-container>
        <span *ngIf="!isLoading()">Join the Gym</span>
      </button>

      <!-- ERROR -->
      <div *ngIf="errorMessage()" class="error">
        {{ errorMessage() }}
      </div>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span>Or continue with</span>
    </div>

    <!-- Social -->
    <div class="social-grid">

      <button type="button" class="social-btn" (click)="loginWith('google')">
        <svg viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Google
      </button>

      <button type="button" class="social-btn" (click)="loginWith('github')">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path fill-rule="evenodd"
            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z"
            clip-rule="evenodd" />
        </svg>
        GitHub
      </button>

    </div>

    <!-- Signin -->
    <div class="signup">
      <p>
        Already a member?
        <a routerLink="/auth/login">Sign in</a>
      </p>
    </div>

  </div>
</div>
