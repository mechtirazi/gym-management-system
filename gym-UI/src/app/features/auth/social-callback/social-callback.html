<div class="callback-container">
  <div class="glass-card text-center">
    <div class="gym-logo" [class.error]="isError()">
      <svg *ngIf="!isError()" class="animate-spin" width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <svg *ngIf="isError()" width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </div>
    <h2 class="text-white mt-4">{{ isError() ? 'Authentication Failed' : 'Authenticating' }}</h2>
    <p [class.text-red-400]="isError()" class="mt-2">{{ status() }}</p>
    
    <button *ngIf="isError()" (click)="router.navigate(['/auth/login'])" class="submit-btn mt-6">
      Back to Login
    </button>
  </div>
</div>
