<article class="course-card glass-card hover-elevate">
  <div class="card-header">
    <div class="course-image-container" role="img" [attr.aria-label]="course().name">
      @if (courseImage) {
      <img [src]="getImageUrl(courseImage)" [alt]="course().name" class="course-image">
      } @else {
      <div class="course-icon-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </div>
      }
    </div>
    <div class="course-info">
      <h2 class="course-title">{{ course().name }}</h2>
      <span class="badge gym-badge">{{ course().gym?.name || 'Main Gym' }}</span>
    </div>
    <div class="card-status active">Live</div>
  </div>

  <p class="course-description">{{ course().description }}</p>

  <div class="details-grid">
    <div class="detail-item">
      <span class="label">Schedule</span>
      <span class="value">{{ activeSessionsCount() }} Active Sessions</span>
    </div>
    <div class="detail-item">
      <span class="label">Capacity</span>
      <span class="value">{{ course().max_capacity || '20' }} Members</span>
    </div>
  </div>

  <div class="card-footer">
    <div class="created-at">Created {{ course().created_at | date:'shortDate' }}</div>
    <div class="action-buttons">
      <button class="icon-btn remove-btn" (click)="deleteClick.emit(course().id_course || course().id)"
        aria-label="Delete course">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
      </button>
      <button class="icon-btn edit-btn" (click)="editClick.emit(course())" title="Update Course" aria-label="Edit course">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>
      <button class="primary-btn small-btn" (click)="manageClick.emit(course())">Manage Classes</button>
    </div>
  </div>
</article>
