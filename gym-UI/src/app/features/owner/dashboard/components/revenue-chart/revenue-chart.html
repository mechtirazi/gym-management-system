<div class="card chart-card">
  <div class="chart-header">
    <div>
      <h2>Revenue Overview</h2>
      <p class="text-slate-500 text-sm mt-1">Monthly earnings summary</p>
    </div>
    <select class="chart-filter" (change)="onFilterChange($event)">
      <option value="this_year">This Year</option>
      <option value="last_6_months">Last 6 Months</option>
    </select>
  </div>
  
  @if (isLoadingChart()) {
    <div class="flex items-center justify-center p-8 text-slate-400" style="height: 320px;">
      <div class="loading-spinner"></div>
    </div>
  } @else if (chartError()) {
    <div class="flex flex-col items-center justify-center text-red-500" style="height: 320px;">
      <p>{{ chartError() }}</p>
      <button class="mt-2 text-sm underline" (click)="fetchChartData('this_year')">Retry</button>
    </div>
  } @else {
    <apx-chart
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [dataLabels]="chartOptions.dataLabels"
      [plotOptions]="chartOptions.plotOptions"
      [yaxis]="chartOptions.yaxis"
      [xaxis]="chartOptions.xaxis"
      [stroke]="chartOptions.stroke"
      [colors]="chartOptions.colors"
      [grid]="chartOptions.grid"
    ></apx-chart>
  }
</div>
