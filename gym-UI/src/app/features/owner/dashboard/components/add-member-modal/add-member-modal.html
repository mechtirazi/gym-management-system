<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Add New Member</h2>
      <button class="close-btn" (click)="closeModal()">×</button>
    </div>
    <form [formGroup]="memberForm" (ngSubmit)="submitAddMember()" class="modal-form">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" formControlName="firstName" placeholder="John" />
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" formControlName="lastName" placeholder="Doe" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" formControlName="phone" placeholder="1234567890" />
      </div>
      <div class="form-group">
        <label>Temporary Password</label>
        <input type="password" formControlName="password" placeholder="password123" />
      </div>
      
      <div class="modal-actions">
        <button type="button" class="cancel-btn" (click)="closeModal()" [disabled]="isSubmitting()">Cancel</button>
        <button type="submit" class="submit-btn" [disabled]="memberForm.invalid || isSubmitting()">
          @if (isSubmitting()) {
            <div class="loading-spinner small"></div>
          } @else {
            Add Member
          }
        </button>
      </div>
    </form>
  </div>
</div>
