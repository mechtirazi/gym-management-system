<div class="add-product-modal animate-fade-in">
  <div class="modal-content glass-card">
    <div class="modal-header">
      <div class="header-title">
        <div class="icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
        </div>
        <div class="title-text">
          <h2>Add New Product</h2>
          <p class="subtitle">Add a new item to your gym inventory</p>
        </div>
      </div>
      <button class="close-btn" (click)="close.emit()">&times;</button>
    </div>

    <form (submit)="onSubmit($event)">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Product Name</label>
          <input type="text" name="name" [(ngModel)]="product.name" placeholder="e.g. Whey Protein" required>
        </div>

        <div class="form-group full-width">
          <label>Category</label>
          <input type="text" name="category" [(ngModel)]="product.category" placeholder="e.g. Supplements" required>
        </div>

        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" name="price" [(ngModel)]="product.price" step="0.01" min="0" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" name="stock" [(ngModel)]="product.stock" min="0" placeholder="0" required>
        </div>
      </div>

      @if (error()) {
        <div class="error-msg animate-fade-in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error() }}
        </div>
      }

      <div class="form-footer">
        <button type="button" class="cancel-btn" (click)="close.emit()">Cancel</button>
        <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="spinner-small"></span>
            Adding...
          } @else {
            Create Product
          }
        </button>
      </div>
    </form>
  </div>
</div>
