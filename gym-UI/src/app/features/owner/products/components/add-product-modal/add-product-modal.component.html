<div class="add-product-modal animate-fade-in">
  <div class="modal-content glass-card">
    <div class="modal-header">
      <div class="header-title">
        <div class="icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
        </div>
        <div class="title-text">
          <h2>Add New Product</h2>
          <p class="subtitle">Add a new item to your gym inventory</p>
        </div>
      </div>
      <button class="close-btn" (click)="close.emit()">&times;</button>
    </div>

    <form (submit)="onSubmit($event)">
      <div class="modal-body-layout">
        <div class="form-left-col">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" [(ngModel)]="product.name" placeholder="e.g. Whey Protein" required>
          </div>

          <div class="form-group">
            <label>Category</label>
            <select name="category" [(ngModel)]="product.category" required>
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div class="form-row-grid">
            <div class="form-group">
              <label>Price ($)</label>
              <input type="number" name="price" [(ngModel)]="product.price" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <div class="form-group">
              <label>Stock Quantity</label>
              <input type="number" name="stock" [(ngModel)]="product.stock" min="0" placeholder="0" required>
            </div>
          </div>

          <div class="form-group">
            <label>Discount Percentage (%)</label>
            <div class="discount-input-wrapper">
               <input type="number" name="discount" [(ngModel)]="product.discount_percentage" min="0" max="100" placeholder="0">
               <span class="discount-badge" *ngIf="(product.discount_percentage || 0) > 0">-{{ product.discount_percentage }}% OFF</span>
            </div>
          </div>
        </div>

        <div class="form-right-col">
          <div class="form-group image-upload-group">
            <label>Product Visual</label>
            <div class="image-preview-container" [class.has-image]="imagePreview" (click)="fileInput.click()">
              @if (imagePreview) {
                <img [src]="imagePreview" alt="Product preview">
                <div class="change-overlay">
                  <span class="material-symbols-rounded">edit</span>
                  <span>Change Image</span>
                </div>
              } @else {
                <div class="upload-placeholder">
                  <span class="material-symbols-rounded">upload_file</span>
                  <span>Upload Image</span>
                  <p>JPG/PNG/WEBP</p>
                  <p class="limit-text">Max 2MB</p>
                </div>
              }
            </div>
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden>
          </div>
        </div>
      </div>

      @if (error()) {
        <div class="error-msg animate-fade-in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error() }}
        </div>
      }

      <div class="form-footer">
        <button type="button" class="cancel-btn" (click)="close.emit()">Cancel</button>
        <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="spinner-small"></span>
            Adding...
          } @else {
            Create Product
          }
        </button>
      </div>
    </form>
  </div>
</div>
