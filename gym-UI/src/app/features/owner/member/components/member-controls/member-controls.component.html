<div class="member-controls">
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input type="text" [ngModel]="searchQuery()" (ngModelChange)="onSearchChange($event)"
      [placeholder]="searchPlaceholder()" aria-label="Search members">
  </div>

  <div class="role-filter">
    @for (status of statusOptions(); track status) {
      <button class="filter-chip"
        [class.active]="selectedStatus() === (status === 'All Members' ? 'All' : status)"
        (click)="onStatusChange(status === 'All Members' ? 'All' : status)"
        [attr.aria-label]="'Filter by ' + status">
        {{ status }}
      </button>
    }
  </div>
</div>
