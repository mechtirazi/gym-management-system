<article class="member-card glass-card hover-elevate">
  <div class="card-header">
    <div class="member-avatar" role="img" aria-label="Member avatar">
      <span class="initials">{{ (member().name || 'Member').charAt(0) }}</span>
      <div class="status-indicator" [class]="(member().status || 'Active').toLowerCase()" [attr.aria-label]="member().status"></div>
    </div>
    <div class="member-info">
      <h2 class="member-name">{{ member().name || 'Unnamed Member' }}</h2>
      <span class="member-status badge">{{ member().status || 'Active' }}</span>
    </div>
    <div class="action-dropdown">
      <button class="icon-btn" aria-label="More options">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1" />
          <circle cx="12" cy="5" r="1" />
          <circle cx="12" cy="19" r="1" />
        </svg>
      </button>
    </div>
  </div>

  <ul class="contact-details">
    <li>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
        <polyline points="22,6 12,13 2,6" />
      </svg>
      <span>{{ member().email }}</span>
    </li>
    <li>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
      </svg>
      <span>{{ member().phone }}</span>
    </li>
  </ul>

  <div class="card-footer">
    <span class="join-date">Joined {{ member().joinedAt | date:'mediumDate' }}</span>
    <div class="action-buttons">
      @if (member().id) {
        <button class="icon-btn remove-btn" (click)="removeClick.emit(member().id!)" aria-label="Remove member">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
        <button class="icon-btn edit-btn" (click)="editMember.emit(member())" aria-label="Update member">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </button>
        <button class="primary-btn small-btn" (click)="profileClick.emit(member().id!)">
          View Profile
        </button>
      }
    </div>
  </div>
</article>
