<header class="hero-profile-header glass-card">
  <!-- Top Banner Section -->
  <div class="hero-banner">
    <div class="banner-overlay"></div>
    <div class="hero-actions-top">
      @if (isEditing()) {
        <button class="btn-premium secondary frosted-btn" style="background: rgba(15, 23, 42, 0.5); color: #f8fafc; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); padding: 0.6rem 1.2rem; font-size: 0.9rem;" (click)="coverInput.click()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          Update Cover Photo
        </button>
        <input type="file" #coverInput hidden accept="image/*" (change)="onCoverChange($event)">
      }
    </div>
  </div>

  <!-- Bottom Info Section -->
  <div class="hero-bottom-info">
    <div class="avatar-container">
      <div class="gym-logo-frame">
        @if (logo()) {
          <img [src]="logo()" [alt]="name()" class="gym-logo-img">
        } @else {
          <span class="avatar-initials">{{ name() ? name().charAt(0) : 'G' }}</span>
        }
        <div class="verify-badge">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
              fill="currentColor" />
          </svg>
        </div>
      </div>
    </div>

    <div class="hero-text-content">
      <h1 class="gym-brand">{{ name() || 'Unnamed Establishment' }}</h1>
      <div class="meta-row">
        <div class="status-badge"><span class="status-dot"></span> Managed by GymUI</div>
        <div class="location-tag" [title]="address()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          {{ (address() | slice:0:45) || 'Location not set' }}...
        </div>
      </div>
    </div>

    <div class="hero-actions">
      @if (!isEditing()) {
        <button class="btn-premium primary" (click)="onToggleEdit.emit()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Modify Profile
        </button>
      } @else {
        <div class="edit-btn-group" style="display: flex; gap: 1rem;">
          <button class="btn-premium secondary" (click)="onToggleEdit.emit()" [disabled]="isSaving()">
            Discard
          </button>
          <button class="btn-premium primary" (click)="onSave.emit()" [disabled]="!canSave()">
            @if (isSaving()) {
              <div class="mini-spinner"></div> Saving...
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              Confirm Changes
            }
          </button>
        </div>
      }
    </div>
  </div>
</header>
