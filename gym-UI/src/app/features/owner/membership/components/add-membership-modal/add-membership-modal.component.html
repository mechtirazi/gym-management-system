<div class="add-membership-modal animate-fade-in"
  (click)="$event.target === $any($event.currentTarget) && close.emit()">
  <div class="modal-content glass-card">
    <div class="modal-header">
      <div class="header-title">
        <div class="icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2" />
            <line x1="2" x2="22" y1="10" y2="10" />
            <line x1="12" y1="14" x2="12" y2="14" />
          </svg>
        </div>
        <div class="title-text">
          <h2>New Membership</h2>
          <p class="subtitle">Enroll a member into a gym plan.</p>
        </div>
      </div>
      <button class="close-btn" (click)="close.emit()" aria-label="Close modal">×</button>
    </div>

    @if (error()) {
    <div class="error-alert">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="red"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ error() }}
    </div>
    }

    <form [formGroup]="membershipForm" class="modal-form">
      <div class="form-grid">
        <!-- Member Selection -->
        <div class="form-group full-width">
          <label for="id_user">Select Member</label>
          <select id="id_user" formControlName="id_user"
            [class.invalid]="membershipForm.get('id_user')?.touched && membershipForm.get('id_user')?.invalid">
            <option value="" disabled selected>Choose a member</option>
            @for (member of members(); track member.id || member.id_user || $index) {
            <option [value]="member.id_user">{{ member.name }} {{ member.last_name }}</option>
            }
          </select>
          @if (membershipForm.get('id_user')?.touched && membershipForm.get('id_user')?.invalid) {
          <span class="error-text">Please select a valid member.</span>
          }
        </div>


        <!-- Status -->
        <div class="form-group">
          <label for="status">Initial Status</label>
          <select id="status" formControlName="status">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>

        <!-- Tier Type -->
        <div class="form-group">
          <label for="type">Membership Tier</label>
          <select id="type" formControlName="type">
            <option value="standard">Standard (30 Days)</option>
            <option value="premium">Premium</option>
            <option value="trial">Trial</option>
          </select>
        </div>

        <!-- Enrollment Date -->
        <div class="form-group">
          <label for="subscribe_date">Enrollment Date</label>
          <input type="date" id="subscribe_date" formControlName="subscribe_date"
            [class.invalid]="membershipForm.get('subscribe_date')?.touched && membershipForm.get('subscribe_date')?.invalid">
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="cancel-btn" (click)="close.emit()">Cancel</button>
        <button type="button" class="submit-btn" (click)="onSubmit()">
          @if (isSubmitting()) {
          <div class="spinner-small"></div>
          Processing...
          } @else if (isLoadingData()) {
          <div class="spinner-small"></div>
          Loading Data...
          } @else {
          Create Subscription
          }
        </button>
      </div>
    </form>
  </div>
</div>
