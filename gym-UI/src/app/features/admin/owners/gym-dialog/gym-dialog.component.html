<div class="admin-dialog-container">
  <div class="admin-dialog-header">
    <div class="header-icon" style="color: var(--admin-accent-emerald); background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2);">
      <mat-icon>domain_add</mat-icon>
    </div>
    <div class="header-title-wrap">
      <h2>Add New Gym</h2>
      <p>Assigning a new facility to owner: <strong>{{ data.ownerName }}</strong></p>
    </div>
  </div>

  <form [formGroup]="gymForm" (ngSubmit)="onSubmit()" class="admin-form-group">
    <!-- Premium Alert System -->
    <div *ngIf="errorMessage()" class="admin-alert status-error mb-6">
       <div class="alert-icon-box" style="background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.2); color: var(--admin-accent-rose);">
          <mat-icon>terminal</mat-icon>
       </div>
       <div class="alert-content">
          <span class="alert-tag" style="color: var(--admin-accent-rose);">System Error</span>
          <h3>Creation Failed</h3>
          <p style="white-space: pre-line; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;">{{ errorMessage() }}</p>
       </div>
    </div>

    <div class="two-col-grid">
      <div class="form-field">
        <label><mat-icon>business</mat-icon> Gym Name</label>
        <div class="input-glow-wrap">
           <input formControlName="name" type="text" placeholder="e.g. Downtown Fitness Center" autocomplete="off" />
        </div>
        <p class="error-text" *ngIf="gymForm.get('name')?.touched && gymForm.get('name')?.errors?.['required']">Gym name is required</p>
      </div>
      <div class="form-field">
        <label><mat-icon>email</mat-icon> Business Email</label>
        <div class="input-glow-wrap">
           <input formControlName="email" type="email" placeholder="contact@gym.com" autocomplete="off" />
        </div>
        <p class="error-text" *ngIf="gymForm.get('email')?.touched && gymForm.get('email')?.invalid">Valid email is required</p>
      </div>
    </div>

    <div class="two-col-grid">
      <div class="form-field">
        <label><mat-icon>location_on</mat-icon> Street Address</label>
        <div class="input-glow-wrap">
           <input formControlName="adress" type="text" placeholder="123 Example St, City" autocomplete="off" />
        </div>
        <p class="error-text" *ngIf="gymForm.get('adress')?.touched && gymForm.get('adress')?.errors?.['required']">Address is required</p>
      </div>
      <div class="form-field">
        <label><mat-icon>phone</mat-icon> Phone Number</label>
        <div class="input-glow-wrap">
           <input formControlName="phone" type="tel" placeholder="+1 234 567 890" />
        </div>
        <p class="error-text" *ngIf="gymForm.get('phone')?.touched && gymForm.get('phone')?.invalid">Phone is required</p>
      </div>
    </div>

    <div class="form-field">
      <label><mat-icon>description</mat-icon> Description</label>
      <div class="input-glow-wrap">
         <textarea formControlName="description" placeholder="Brief description of the gym facilities..." rows="2"></textarea>
      </div>
      <p class="error-text" *ngIf="gymForm.get('description')?.touched && gymForm.get('description')?.invalid">Description is required (min 10 chars)</p>
    </div>

    <div class="two-col-grid">
       <div class="form-field">
          <label><mat-icon>groups</mat-icon> Max Capacity</label>
          <div class="input-glow-wrap">
             <input formControlName="capacity" type="number" placeholder="100" />
          </div>
          <p class="error-text" *ngIf="gymForm.get('capacity')?.touched && gymForm.get('capacity')?.errors?.['min']">Min 1</p>
       </div>
       <div class="form-field">
          <label><mat-icon>schedule</mat-icon> Mon - Fri Hours</label>
          <div class="input-glow-wrap">
             <input formControlName="open_mon_fri" type="text" placeholder="08:00-22:00" />
          </div>
          <p class="error-text" *ngIf="gymForm.get('open_mon_fri')?.touched && gymForm.get('open_mon_fri')?.invalid">Invalid format</p>
       </div>
    </div>

    <div class="two-col-grid" style="margin-top: -0.5rem;">
       <div class="form-field">
          <label><mat-icon>event</mat-icon> Saturday Hours</label>
          <div class="input-glow-wrap">
             <input formControlName="open_sat" type="text" placeholder="08:00-20:00" />
          </div>
       </div>
       <div class="form-field">
          <label><mat-icon>event_busy</mat-icon> Sunday Hours</label>
          <div class="input-glow-wrap">
             <input formControlName="open_sun" type="text" placeholder="08:00-16:00" />
          </div>
       </div>
    </div>

    <div class="admin-dialog-footer">
      <button type="button" (click)="onCancel()" class="admin-btn" [disabled]="loading()">
         <mat-icon>close</mat-icon> Cancel
      </button>
      <button type="submit" [disabled]="gymForm.invalid || loading()" class="admin-btn btn-primary">
         <mat-icon>{{ loading() ? 'sync' : 'add_location' }}</mat-icon>
         {{ loading() ? 'Creating...' : 'Create Gym' }}
      </button>
    </div>
  </form>
</div>
