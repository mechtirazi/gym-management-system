<div class="payment-modal-overlay" [class.active]="showModal" (click)="closeModal()">
  <div class="checkout-vault-card" (click)="$event.stopPropagation()">
      <button class="btn-close-modal" (click)="closeModal()">
          <span class="material-symbols-rounded">close</span>
      </button>

      <div class="modal-header">
          <div class="security-badge">
              <span class="material-symbols-rounded">security</span>
              Secure End-to-End Encryption
          </div>
          <h2>{{ headerTitle }}</h2>
          <div class="checkout-stepper">
              <div class="step-dot" [class.active]="paymentStepper >= 1">1</div>
              <div class="step-line" [class.active]="paymentStepper >= 2"></div>
              <div class="step-dot" [class.active]="paymentStepper >= 2">2</div>
              <div class="step-line" [class.active]="paymentStepper >= 3"></div>
              <div class="step-dot" [class.active]="paymentStepper >= 3">3</div>
          </div>
      </div>

      <div class="modal-body">
          <div class="step-view" *ngIf="paymentStepper === 1">
              <div class="order-recap">
                  <div class="item-preview-mini">
                      <img [src]="itemImage" alt="Item Image" onerror="this.src='https://ui-avatars.com/api/?name=Hub&background=1e293b&color=10b981&bold=true'">
                      <div class="preview-text">
                          <h3>{{ itemTitle }}</h3>
                          <p>{{ itemSubtitle }}</p>
                      </div>
                      <div class="item-price-pill">VERIFIED</div>
                  </div>
                  <div class="vault-terms">
                      <p>{{ purchaseTerms }}</p>
                  </div>
              </div>
              <button class="btn-primary-glow" (click)="nextStep()">Proceed to Payment</button>
          </div>

          <div class="step-view" *ngIf="paymentStepper === 2">
              <div class="vault-form">
                  <div class="form-row">
                      <label>Cardholder Name</label>
                      <input type="text" placeholder="FULL NAME" class="vault-input">
                  </div>
                  <div class="form-row">
                      <label>Card Number</label>
                      <input type="text" placeholder="•••• •••• •••• 4242" class="vault-input">
                  </div>
                  <div class="form-row grid-2">
                      <div>
                          <label>Expiry</label>
                          <input type="text" placeholder="MM/YY" class="vault-input">
                      </div>
                      <div>
                          <label>CVC</label>
                          <input type="text" placeholder="•••" class="vault-input">
                      </div>
                  </div>
              </div>
              <button class="btn-primary-glow" (click)="nextStep()">Authorize Transaction</button>
          </div>

          <div class="step-view centering" *ngIf="paymentStepper === 3">
              <div class="sync-animation">
                  <div class="sync-ring"></div>
                  <div class="sync-core">
                      <span class="material-symbols-rounded">sync</span>
                  </div>
              </div>
              <h3 class="sync-label">{{ processingPayment ? 'Connecting Nodes...' : 'Transaction Confirmed' }}</h3>
          </div>
      </div>
  </div>
</div>
