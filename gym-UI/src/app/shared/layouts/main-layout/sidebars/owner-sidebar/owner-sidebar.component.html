<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4H18M6 20H18M9 4V20M15 4V20M12 4V20M18 8H21V16H18M6 8H3V16H6" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <span class="logo-text">
        <span>GYM<span class="text-primary">UI</span></span>
        <small class="role-badge">Owner</small>
      </span>
    </div>
  </div>

  <nav class="sidebar-nav" [class.blocked-mode]="connectedGymStatus() === 'suspended'">
    @for (item of navItems; track item.label) {
    @if (item.isHeader) {
    <div class="nav-header" [class.locked]="isLocked(item)">{{ item.label }}</div>
    } @else {
    <a [routerLink]="isLocked(item) ? null : item.route" 
       routerLinkActive="active" 
       class="nav-item" 
       [class.locked]="isLocked(item)"
       [attr.title]="isLocked(item) ? item.label + ' (Suspended)' : item.label">
      <span class="nav-icon" [innerHTML]="getIcon(item.icon!)"></span>
      <span class="nav-label">{{ item.label }}</span>
      @if (isLocked(item)) {
        <span class="lock-indicator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </span>
      }
    </a>
    }
    }
  </nav>

  <div class="sidebar-footer">
    <div class="support-card">
      <div class="support-icon">🎧</div>
      <div class="support-content">
        <p class="support-title">Owner support</p>
        <p class="support-desc">24/7 priority line</p>
      </div>
      <button class="support-btn">
        <span>Contact Support</span>
      </button>
    </div>
  </div>
</aside>
