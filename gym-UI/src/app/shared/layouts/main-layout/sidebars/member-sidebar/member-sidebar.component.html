<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <line x1="12" y1="2" x2="12" y2="6"></line>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
          <line x1="2" y1="12" x2="6" y2="12"></line>
          <line x1="18" y1="12" x2="22" y2="12"></line>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
        </svg>
      </div>
      <div class="logo-text">
        <span>GYM<span class="text-primary">UI</span></span>
        <span class="role-badge">Member</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <div *ngIf="item.isHeader" class="nav-header">{{ item.label }}</div>
      <a *ngIf="!item.isHeader" [routerLink]="item.routePath" routerLinkActive="active" class="nav-item">
        <div class="nav-icon" [innerHTML]="getIcon(item.icon || '')"></div>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="support-card">
      <div class="support-icon">✨</div>
      <div class="support-content">

        <div class="support-desc">Unlock all features.</div>
      </div>
      <button class="upgrade-plan-btn" (click)="showUpgradeNotification()">
        <span class="material-icons">workspace_premium</span>
        <div class="btn-info">
          <span class="main">ACTIVATE_ELITE</span>
          <span class="sub">Sync Advanced Features</span>
        </div>
      </button>
    </div>
  </div>
</aside>
