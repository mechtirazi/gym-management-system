<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 4H18M6 20H18M9 4V20M15 4V20M12 4V20M18 8H21V16H18M6 8H3V16H6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
      <div class="logo-text">
        <span>GYM<span class="text-primary">UI</span></span>
        <span class="role-badge">Member</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <div *ngIf="item.isHeader" class="nav-header">{{ item.label }}</div>
      <a *ngIf="!item.isHeader" [routerLink]="item.routePath" routerLinkActive="active" class="nav-item">
        <div class="nav-icon" [innerHTML]="getIcon(item.icon || '')"></div>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="support-card">
      <div class="support-icon">✨</div>
      <div class="support-content">
        <div class="support-title">Member Pro</div>
        <div class="support-desc">Unlock all features.</div>
      </div>
      <button class="upgrade-node-btn" (click)="showUpgradeNotification()">
        <span class="material-icons">workspace_premium</span>
        <div class="btn-info">
          <span class="main">Upgrade Tier</span>
          <span class="sub">Access Elite Nodes</span>
        </div>
      </button>
    </div>
  </div>
</aside>
