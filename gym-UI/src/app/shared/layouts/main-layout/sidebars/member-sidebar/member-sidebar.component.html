<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <line x1="12" y1="2" x2="12" y2="6"></line>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
          <line x1="2" y1="12" x2="6" y2="12"></line>
          <line x1="18" y1="12" x2="22" y2="12"></line>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
        </svg>
      </div>
      <div class="logo-text">
        <span>GYM<span class="text-primary">UI</span></span>
        <span class="role-badge">Member</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <div *ngIf="item.isHeader" class="nav-header">{{ item.label }}</div>
      <a *ngIf="!item.isHeader" [routerLink]="item.routePath" routerLinkActive="active" class="nav-item">
        <div class="nav-icon" [innerHTML]="getIcon(item.icon || '')"></div>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="support-card">
      <div class="support-icon">🎧</div>
      <div class="support-content">
        <p class="support-title">Member Support</p>
        <p class="support-desc">Direct line to help desk</p>
      </div>
      <button class="support-btn" (click)="openSupportModal()">
        <span>Contact Support</span>
      </button>
    </div>
  </div>
</aside>

<!-- Support Modal Overlay -->
<div class="support-modal-overlay" *ngIf="showSupportModal()" [class.active]="showSupportModal()">
  <div class="support-modal">
    <div class="modal-header">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h3>Member Assistance</h3>
      <button class="btn-close" (click)="closeSupportModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div class="modal-body">
      <p>Having trouble with your membership, payments, or access? Describe your issue and we'll resolve it.</p>
      
      <div class="form-group">
        <textarea 
          placeholder="Describe your issue here... (e.g. course access error, membership status, etc.)" 
          [ngModel]="supportMessage()"
          (ngModelChange)="supportMessage.set($event)"
          rows="4">
        </textarea>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="closeSupportModal()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!supportMessage().trim() || isSubmittingSupport()" (click)="submitSupportRequest()">
        <span *ngIf="isSubmittingSupport()">Sending...</span>
        <span *ngIf="!isSubmittingSupport()">Send Message</span>
      </button>
    </div>
  </div>
</div>
