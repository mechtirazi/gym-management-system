<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4H18M6 20H18M9 4V20M15 4V20M12 4V20M18 8H21V16H18M6 8H3V16H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">
        <span>GYM<span class="text-primary">UI</span></span>
        <small class="role-badge">Receptionist</small>
      </span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-scroll-wrapper">
      @for (item of navItems; track item.label) {
        @if (item.isHeader) {
          <div class="nav-header">{{ item.label }}</div>
        } @else {
          <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [attr.title]="item.label">
            <span class="nav-icon" [innerHTML]="getIcon(item.icon!)"></span>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        }
      }
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="support-card">
      <div class="support-icon">🧾</div>
      <div class="support-content">
        <p class="support-title">Front desk</p>
        <p class="support-desc">Check-ins, payments, and members</p>
      </div>
      <button class="support-btn">
        <span>Quick actions</span>
      </button>
    </div>
  </div>
</aside>
