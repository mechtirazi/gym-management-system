<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4H18M6 20H18M9 4V20M15 4V20M12 4V20M18 8H21V16H18M6 8H3V16H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">GYM<span>UI</span></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems(); track item.label) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  @if (userRole() !== 'owner' && userRole() !== 'admin') {
    <div class="sidebar-footer">
      <div class="upgrade-card">
        <div class="upgrade-icon">✨</div>
        <div class="upgrade-content">
          <p class="upgrade-title">Pro Plan</p>
          <p class="upgrade-desc">Get unlimited workouts</p>
        </div>
        <button class="upgrade-btn">Upgrade</button>
      </div>
    </div>
  }
</aside>
